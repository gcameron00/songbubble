<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Songs table &mdash; BubbleTrouble</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="/bubbletrouble/" class="logo" style="color: #d97706;">
          <span class="logo-bubble" style="color: #f59e0b;" aria-hidden="true">&#9679;</span>
          BubbleTrouble
        </a>
        <nav class="site-nav">
          <a href="/bubbletrouble/" class="debug-link">Overview</a>
          <a href="/bubbletrouble/songs/" class="debug-link active">Songs</a>
          <a href="/bubbletrouble/votes/" class="debug-link">Votes</a>
          <span class="site-nav-divider" aria-hidden="true"></span>
          <a href="/">&#8592; SongBubble</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="debug-header">
        <h1>Songs table</h1>
        <span class="debug-badge">debug</span>
      </div>
      <p class="debug-note">All songs. Score is the current decay-weighted vote total. Click a column header to sort.</p>

      <div id="status" class="debug-note">Loading&hellip;</div>

      <div class="debug-table-wrap">
        <table class="debug-table">
          <thead id="thead"><tr></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="debug-pagination" id="pagination"></div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p><a href="/bubbletrouble/">&#8592; Back to BubbleTrouble</a></p>
      </div>
    </footer>

    <script>
      const COLS = [
        { key: 'id',             label: 'ID' },
        { key: 'title',          label: 'Title' },
        { key: 'artist',         label: 'Artist' },
        { key: 'album',          label: 'Album' },
        { key: 'score',          label: 'Score' },
        { key: 'apple_music_id', label: 'AM' },
        { key: 'artwork_url',    label: 'Art' },
        { key: 'created_at',     label: 'Added (UTC)' },
      ];

      const params      = new URLSearchParams(location.search);
      let currentPage   = Math.max(1, parseInt(params.get('page') ?? '1'));
      let currentSort   = params.get('sort')  ?? 'id';
      let currentOrder  = params.get('order') ?? 'asc';

      function renderHeaders() {
        const tr = document.querySelector('#thead tr');
        tr.innerHTML = '';
        for (const col of COLS) {
          const th = document.createElement('th');
          const isActive = currentSort === col.key;
          th.className  = 'sortable' + (isActive ? ' sort-active' : '');
          th.innerHTML  = col.label + (isActive ? `<span class="sort-indicator">${currentOrder === 'asc' ? ' \u2191' : ' \u2193'}</span>` : '');
          th.addEventListener('click', () => {
            if (currentSort === col.key) {
              currentOrder = currentOrder === 'asc' ? 'desc' : 'asc';
            } else {
              currentSort  = col.key;
              currentOrder = 'asc';
            }
            currentPage = 1;
            navigate(currentPage);
          });
          tr.appendChild(th);
        }
      }

      async function load(page) {
        document.getElementById('status').textContent = 'Loading\u2026';
        renderHeaders();

        const res  = await fetch(`/api/debug/songs?page=${page}&sort=${currentSort}&order=${currentOrder}`);
        const data = await res.json();

        document.getElementById('status').textContent =
          `${data.total} row${data.total === 1 ? '' : 's'} \u2014 page ${data.page} of ${Math.ceil(data.total / data.per_page) || 1}`;

        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        for (const row of data.results) {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="num">${row.id}</td>
            <td class="song-cell">${esc(row.title)}</td>
            <td>${esc(row.artist)}</td>
            <td>${esc(row.album ?? '\u2014')}</td>
            <td class="num">${row.score}</td>
            <td class="mono check">${row.apple_music_id ? '\u2713' : '\u2014'}</td>
            <td class="mono check">${row.artwork_url    ? '\u2713' : '\u2014'}</td>
            <td class="mono">${new Date(row.created_at * 1000).toISOString().slice(0, 19).replace('T', ' ')}</td>
          `;
          tbody.appendChild(tr);
        }

        renderPagination(page, Math.ceil(data.total / data.per_page) || 1);
      }

      function renderPagination(page, totalPages) {
        const pg = document.getElementById('pagination');
        pg.innerHTML = '';
        if (page > 1) {
          const b = document.createElement('button');
          b.textContent = '\u2190 Prev';
          b.className = 'pg-btn';
          b.onclick = () => navigate(page - 1);
          pg.appendChild(b);
        }
        if (page < totalPages) {
          const b = document.createElement('button');
          b.textContent = 'Next \u2192';
          b.className = 'pg-btn';
          b.onclick = () => navigate(page + 1);
          pg.appendChild(b);
        }
      }

      function navigate(page) {
        currentPage = page;
        history.pushState(null, '', `?page=${page}&sort=${currentSort}&order=${currentOrder}`);
        load(page);
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      window.addEventListener('popstate', () => {
        const p      = new URLSearchParams(location.search);
        currentPage  = Math.max(1, parseInt(p.get('page')  ?? '1'));
        currentSort  = p.get('sort')  ?? 'id';
        currentOrder = p.get('order') ?? 'asc';
        load(currentPage);
      });

      load(currentPage);
    </script>
  </body>
</html>
