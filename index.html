<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SongBubble — Top songs right now</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js" crossorigin></script>
    <script defer src="/assets/js/main.js"></script>
    <script defer src="/assets/js/tagline.js"></script>
    <script defer src="/assets/js/submit.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="/" class="logo" aria-label="SongBubble home">
          <span class="logo-bubble" aria-hidden="true">&#9679;</span>
          SongBubble
        </a>
        <nav class="site-nav">
          <a href="/">Chart</a>
          <a href="/about/">About</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="hero">
        <h1>What song <span id="tagline-phrase" aria-live="polite">is hitting right now?</span></h1>
        <p class="hero-sub">Vote for the songs you currently love most. Votes fade over 28 days keeping the chart honest.</p>
      </section>

      <section class="search-section" aria-label="Search songs">
        <form class="search-form" id="search-form" role="search">
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Search by song, artist or album&hellip;"
            aria-label="Search by song, artist or album"
            autocomplete="off"
          />
          <button type="submit" class="search-btn" aria-label="Search">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </button>
        </form>
      </section>

      <section class="chart-section" aria-label="Top songs chart">
        <div class="chart-header">
          <h2 class="chart-title">Top 10 right now</h2>
          <span class="chart-meta" id="vote-budget-display"></span>
        </div>
        <ol class="chart-list" id="chart-list" aria-live="polite">
          <!-- Rendered by main.js -->
        </ol>
        <p class="no-results hidden" id="no-results">No songs match your search.</p>
      </section>

      <div id="song-add" hidden></div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <p>&copy; 2026 SongBubble &mdash; <a href="/about/">About</a></p>
        <p class="footer-note">Votes fade over 28 days to keep the chart fresh.</p>
      </div>
    </footer>
  </body>
</html>
